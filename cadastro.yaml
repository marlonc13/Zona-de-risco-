appId: com.example.zonaderisco

---
- launchApp

- tapOn: "Cadastrar"

- assertVisible: "Cadastro"

- tapOn: "Nome"
- inputText: "Keizi Santos"

- tapOn: "Email"
- inputText: "keizi@email.com"

- tapOn: "Senha"
- inputText: "123456"

- tapOn: "Confirmar Senha"
- inputText: "123456"

- tapOn: "Cadastrar"

- assertVisible: "Cadastro realizado"